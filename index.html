<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0f1e2e" />
    <title>ai& Office Arcade</title>

    <!--
      Fonts:
        Inter  -> clean sans-serif for UI.
        "Press Start 2P" -> pixel-font placeholder for future RPG elements.
      Replace with self-hosted fonts before production for offline reliability.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ai-navy: #0f1e2e;
        --ai-blue: #1f6feb;
        --ai-gray: #c7d2dc;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--ai-navy);
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ai-gray);
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      /* Boot splash shown until Phaser takes over the canvas. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: radial-gradient(circle at 50% 35%, #16314a 0%, var(--ai-navy) 70%);
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #boot-splash .logo {
        font-weight: 800;
        font-size: clamp(34px, 7vw, 72px);
        letter-spacing: -1px;
        color: #fff;
      }
      #boot-splash .logo span {
        color: var(--ai-blue);
      }
      #boot-splash .logo small {
        font-size: 0.34em;
        letter-spacing: 4px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--ai-gray);
        display: block;
        margin-top: 6px;
      }
      #boot-splash .spinner {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--ai-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Pre-canvas splash with the ai& brand. Removed by BootScene once ready. -->
    <div id="boot-splash">
      <div class="logo">ai<span>&amp;</span><small>Office Arcade</small></div>
      <div class="spinner" aria-label="Loading"></div>
    </div>

    <!-- Phaser mounts its canvas inside this element. -->
    <div id="game"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
